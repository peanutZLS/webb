<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解憂雜貨店占卜</title>
    <style>
        :root {
            --primary-pink: #ffafbd;
            --soft-blue: #ffc3a0;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
            width: 350px;
            backdrop-filter: blur(5px);
            border: 2px solid white;
            z-index: 10;
        }

        h1 { 
            color: #d87093; 
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .description { 
            color: #b5a4a4; 
            font-size: 0.9rem; 
            margin-bottom: 2rem; 
            font-weight: bold;
        }

        button {
            background: linear-gradient(to right, #ff9aa2, #ffb6c1);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 182, 193, 0.5);
            outline: none;
            margin-bottom: 1rem;
        }

        button:hover { 
            transform: translateY(-3px) scale(1.03); 
        }

        #result {
            margin-top: 1rem;
            color: #7d5a5a;
            line-height: 1.4;
            min-height: 5rem;
            animation: fadeIn 0.5s ease;
        }

        .main-text {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .index-text {
            font-size: 1.1rem;
            color: #e67e22; /* 橘色強調指數 */
            font-weight: bold;
            display: block;
            border-top: 1px dashed #ffc3a0;
            padding-top: 10px;
            margin-top: 10px;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            animation: fly 1s linear forwards;
            z-index: 999;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>解憂雜貨店占卜</h1>
    <p class="description">🐾 Only for 小狗狗使用 🐾</p>
    
    <button onclick="revealFate(event)">點擊占卜今日份的愛</button>
    
    <div id="result"></div>
</div>

<script>
    function revealFate(e) {
        // --- 1. 基礎占卜邏輯 ---
        const characters = ["鵪鶉", "大狗", "店長"];
        const actions = ["想你", "想抱你", "想蓋印章", "想蹭蹭", "想貼貼", "想捏大腿", "想打屁股", "想摸頭", "想抓你脖子"];
        
        const char = characters[Math.floor(Math.random() * characters.length)];
        const action = actions[Math.floor(Math.random() * actions.length)];
        
        // --- 2. 指數邏輯 (70~100) ---
        const score = Math.floor(Math.random() * (100 - 70 + 1)) + 70;
        let level = "";
        
        if (score >= 96) {
            level = "💖 超級想";
        } else if (score >= 90) {
            level = "🔥 大想";
        } else if (score >= 80) {
            level = "✨ 中想";
        } else {
            level = "🌤️ 小想";
        }

        // --- 3. 渲染畫面 ---
        const resultDiv = document.getElementById('result');
        resultDiv.style.animation = 'none';
        resultDiv.offsetHeight;
        resultDiv.style.animation = 'fadeIn 0.5s ease';
        
        resultDiv.innerHTML = `
            <span class="main-text">✨ 今天 ${char} ✨<br>超級超級 ${action}</span>
            <span class="index-text">想念指數：${score} % (${level})</span>
        `;

        // --- 4. 愛心特效 ---
        for (let i = 0; i < 15; i++) {
            createHeart(e.clientX, e.clientY);
        }
    }

    function createHeart(x, y) {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.classList.add('heart');
        const moveX = (Math.random() - 0.5) * 300;
        const moveY = (Math.random() - 0.5) * 300;
        heart.style.setProperty('--x', `${moveX}px`);
        heart.style.setProperty('--y', `${moveY}px`);
        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
</script>

</body>
</html>
